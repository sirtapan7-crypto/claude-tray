# Dependabot configuration
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # NuGet packages referenced by ClaudeTray.csproj
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"

  # NOTE: A "github-actions" ecosystem entry was removed because this repo has no
  # workflows yet. Dependabot's github-actions updater now hard-errors when it finds
  # no /action.yml or .github/workflows/*.yml. Re-add the block once workflows exist.
